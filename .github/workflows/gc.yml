# Garbage collection for the hestia binary cache.

name: Cache GC

concurrency:
  group: hestia-gc
  cancel-in-progress: false

on:
  schedule:
    # Daily, off-peak (UTC).
    - cron: "23 3 * * *"
  # Manual runs for debugging and one-off cleanups.
  workflow_dispatch:
    inputs:
      dry-run:
        description: Plan only; do not repack, touch, or delete anything.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  gc:
    runs-on: ubuntu-latest
    permissions:
      # REST cache deletes need actions:write.
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: samueldr/lix-gha-installer-action@v2026-06-15
      - uses: Mic92/hestia@v2
        with:
          upstream-cache-filter: true
      - name: Run garbage collection
        run: $HESTIA_BIN gc
        env:
          GITHUB_TOKEN: ${{ github.token }}
